name: Deploy BE to Azure VM

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x ./mvnw

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/azureuser/catholic-souvenir-custom-order/backend/"
          strip_components: 1

      - name: Copy docker-compose and nginx to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "docker-compose.yml,nginx/nginx.conf"
          target: "/home/azureuser/catholic-souvenir-custom-order/"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/catholic-souvenir-custom-order
            
            # 1. Dọn dẹp và chuẩn bị file JAR
            mkdir -p backend
            # Tìm file jar trong target vừa scp lên và chuyển vào folder backend
            mv target/*.jar backend/app.jar 2>/dev/null || true
            rm -rf target/

            # 2. Thực hiện cập nhật
            # Dùng 'up --build' là cách chuẩn nhất để Docker nhận diện file JAR mới và build lại Image
            echo "==> Đang build lại image và restart backend..."
            docker compose --env-file .env up -d --build backend

            # 3. Reload Nginx để đảm bảo kết nối không bị ngắt
            echo "==> Reloading Nginx..."
            docker compose --env-file .env exec -T nginx nginx -s reload 2>/dev/null || true

            # 4. Dọn dẹp các image cũ (dangling images) để tiết kiệm ổ cứng Azure
            docker image prune -f

            # 5. Kiểm tra trạng thái
            echo "==> Chờ backend khởi động (20s)..."
            sleep 20
            docker compose --env-file .env ps
            echo "==> Deploy hoàn tất code mới!"