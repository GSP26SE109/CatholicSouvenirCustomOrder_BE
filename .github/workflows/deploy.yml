name: Deploy BE to Azure VM

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x ./mvnw

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

#      - name: Copy Files to VM
#        uses: appleboy/scp-action@v0.1.7
#        with:
#            host: ${{ secrets.AZURE_VM_IP }}
#            username: ${{ secrets.AZURE_VM_USER }}
#            key: ${{ secrets.AZURE_SSH_KEY }}
#            source: "target/*.jar,docker-compose.yml,Dockerfile,nginx/nginx.conf"
#            target: "/home/azureuser/catholic-souvenir-custom-order/"
#            strip_components: 0

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/azureuser/catholic-souvenir-custom-order/backend/"
          strip_components: 1

      - name: Copy docker-compose and nginx to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "docker-compose.yml,nginx/nginx.conf"
          target: "/home/azureuser/catholic-souvenir-custom-order/"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/catholic-souvenir-custom-order

            find backend/ -name "*.jar" ! -name "app.jar" -delete
            
            # Doi ten jar
            mv backend/*.jar backend/app.jar 2>/dev/null || true

            # Kiem tra lan dau hay khong
            RUNNING=$(docker compose --env-file .env ps -q 2>/dev/null | wc -l)

            if [ "$RUNNING" -eq "0" ]; then
              echo "==> Lan dau: khoi dong tat ca containers..."
              docker compose --env-file .env up -d
            else
              echo "==> Cap nhat: chi restart backend..."
              docker compose --env-file .env build --no-cache backend
              docker compose --env-file .env up -d --force-recreate backend
              echo "==> Reload Nginx config..."
              docker compose --env-file .env exec -T nginx nginx -s reload
              docker image prune -f
            fi

            # Cho backend khoi dong
            echo "==> Waiting 30s for backend..."
            sleep 30

            # Kiem tra trang thai
            docker compose --env-file .env ps
            echo "==> Deploy done!"