name: Deploy BE to Azure VM

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x ./mvnw

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/azureuser/catholic-souvenir-custom-order/backend/"
          strip_components: 1

      - name: Copy docker-compose and nginx to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "docker-compose.yml,nginx/nginx.conf"
          target: "/home/azureuser/catholic-souvenir-custom-order/"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/catholic-souvenir-custom-order
  
            echo "==> Clean old jar..."
            find backend/ -name "*.jar" ! -name "app.jar" -delete
            
            echo "==> Rename jar..."
            mv backend/*.jar backend/app.jar 2>/dev/null || true
            
            echo "==> Build new backend image..."
            docker compose --env-file .env build --no-cache backend
            
            echo "==> Restart backend..."
            docker compose --env-file .env up -d backend
            
            echo "==> Reload nginx..."
            docker compose --env-file .env exec -T nginx nginx -s reload || true
            
            echo "==> Remove old images..."
            docker image prune -f
            
            echo "==> Waiting 30s..."
            sleep 30
            
            docker compose --env-file .env ps
  
            echo "==> Deploy done!"