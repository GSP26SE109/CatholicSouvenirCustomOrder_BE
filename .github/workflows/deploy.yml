name: Deploy BE to Azure VM

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x ./mvnw

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/azureuser/catholic-souvenir-custom-order/backend/"
          strip_components: 1

      - name: Copy docker-compose and nginx to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "docker-compose.yml,nginx/nginx.conf"
          target: "/home/azureuser/catholic-souvenir-custom-order/"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/catholic-souvenir-custom-order

            # Xoa app.jar cu truoc
            rm -f backend/app.jar

            # Tim va doi ten jar moi
            JAR_FILE=$(find backend/ -name "*.jar" ! -name "app.jar" | head -1)
            if [ -z "$JAR_FILE" ]; then
              echo "ERROR: Khong tim thay jar moi!"
              exit 1
            fi
            mv "$JAR_FILE" backend/app.jar
            echo "==> Da copy jar moi: $(ls -lh backend/app.jar)"

            RUNNING=$(docker compose --env-file .env ps -q 2>/dev/null | wc -l)

            if [ "$RUNNING" -eq "0" ]; then
              echo "==> Lan dau: khoi dong tat ca..."
              docker compose --env-file .env up -d
            else
              echo "==> Dung backend..."
              docker compose --env-file .env stop backend

              echo "==> Xoa container backend cu..."
              docker compose --env-file .env rm -f backend

              echo "==> Khoi dong backend moi..."
              docker compose --env-file .env up -d backend

              echo "==> Reload Nginx..."
              docker compose --env-file .env exec -T nginx nginx -s reload
            fi

            echo "==> Waiting 45s for backend..."
            sleep 45

            docker compose --env-file .env ps
            echo "==> Kiem tra jar dang chay..."
            docker compose --env-file .env exec -T backend ls -lh /app/app.jar
            echo "==> Deploy done!"