<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            margin-bottom: 10px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 200px);
        }
        
        .sidebar {
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding: 20px;
            overflow-y: auto;
        }
        
        .config-section {
            margin-bottom: 25px;
        }
        
        .config-section h3 {
            color: #495057;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #6c757d;
            font-size: 13px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            width: 100%;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #ffffff;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }
        
        .message.sent {
            background: #667eea;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        
        .message.received {
            background: #e9ecef;
            color: #212529;
        }
        
        .message .sender {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .message .content {
            font-size: 14px;
            line-height: 1.4;
        }
        
        .message .time {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .message-input {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 25px;
            font-size: 14px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-group button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .input-group button:hover {
            background: #5568d3;
        }
        
        .input-group button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .log {
            background: #f8f9fa;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #6c757d;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔌 WebSocket Chat Test</h1>
            <p>Test real-time chat với WebSocket & STOMP</p>
        </div>
        
        <div class="main-content">
            <!-- Sidebar Configuration -->
            <div class="sidebar">
                <div class="config-section">
                    <h3>📡 Connection Status</h3>
                    <div id="connectionStatus" class="status disconnected">
                        Disconnected
                    </div>
                </div>
                
                <div class="config-section">
                    <h3>⚙️ Configuration</h3>
                    <div class="form-group">
                        <label>WebSocket URL</label>
                        <input type="text" id="wsUrl" value="http://localhost:8080/ws" placeholder="ws://localhost:8080/ws">
                    </div>
                    
                    <div class="form-group">
                        <label>JWT Token</label>
                        <input type="text" id="jwtToken" placeholder="Paste your JWT token here">
                    </div>
                    
                    <div class="form-group">
                        <label>Conversation ID</label>
                        <input type="text" id="conversationId" placeholder="UUID của conversation">
                    </div>
                    
                    <div class="form-group">
                        <label>Your User ID</label>
                        <input type="text" id="userId" placeholder="UUID của bạn">
                    </div>
                    
                    <button id="connectBtn" class="btn btn-primary">Connect</button>
                    <button id="disconnectBtn" class="btn btn-danger" style="margin-top: 10px;" disabled>Disconnect</button>
                </div>
                
                <div class="config-section">
                    <h3>📋 Connection Log</h3>
                    <div id="log" class="log"></div>
                </div>
            </div>
            
            <!-- Chat Area -->
            <div class="chat-area">
                <div id="messages" class="messages">
                    <div style="text-align: center; color: #6c757d; padding: 50px 20px;">
                        <h3>👋 Chào mừng đến Chat Test</h3>
                        <p>Kết nối WebSocket để bắt đầu chat</p>
                    </div>
                </div>
                
                <div class="message-input">
                    <div class="input-group">
                        <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." disabled>
                        <button id="sendBtn" disabled>Gửi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let stompClient = null;
        let subscription = null;
        
        const wsUrlInput = document.getElementById('wsUrl');
        const jwtTokenInput = document.getElementById('jwtToken');
        const conversationIdInput = document.getElementById('conversationId');
        const userIdInput = document.getElementById('userId');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesDiv = document.getElementById('messages');
        const statusDiv = document.getElementById('connectionStatus');
        const logDiv = document.getElementById('log');
        
        // Load saved config from localStorage
        window.addEventListener('load', () => {
            wsUrlInput.value = localStorage.getItem('wsUrl') || 'http://localhost:8080/ws';
            jwtTokenInput.value = localStorage.getItem('jwtToken') || '';
            conversationIdInput.value = localStorage.getItem('conversationId') || '';
            userIdInput.value = localStorage.getItem('userId') || '';
        });
        
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }
        
        function updateStatus(connected) {
            if (connected) {
                statusDiv.className = 'status connected';
                statusDiv.textContent = '✅ Connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                messageInput.disabled = false;
                sendBtn.disabled = false;
            } else {
                statusDiv.className = 'status disconnected';
                statusDiv.textContent = '❌ Disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                messageInput.disabled = true;
                sendBtn.disabled = true;
            }
        }
        
        function connect() {
            const wsUrl = wsUrlInput.value.trim();
            const jwtToken = jwtTokenInput.value.trim();
            const conversationId = conversationIdInput.value.trim();
            const userId = userIdInput.value.trim();
            
            if (!wsUrl || !jwtToken || !conversationId || !userId) {
                alert('Vui lòng điền đầy đủ thông tin!');
                return;
            }
            
            // Save to localStorage
            localStorage.setItem('wsUrl', wsUrl);
            localStorage.setItem('jwtToken', jwtToken);
            localStorage.setItem('conversationId', conversationId);
            localStorage.setItem('userId', userId);
            
            addLog('Đang kết nối đến ' + wsUrl);
            
            const socket = new SockJS(wsUrl + '?token=' + jwtToken);
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, 
                function(frame) {
                    addLog('✅ Kết nối thành công!');
                    updateStatus(true);
                    
                    // Subscribe to conversation topic
                    const topic = `/topic/chat/${conversationId}`;
                    addLog('Đăng ký topic: ' + topic);
                    
                    subscription = stompClient.subscribe(topic, function(message) {
                        addLog('📨 Nhận tin nhắn mới');
                        const chatMessage = JSON.parse(message.body);
                        displayMessage(chatMessage);
                    });
                    
                    // Clear welcome message
                    messagesDiv.innerHTML = '';
                },
                function(error) {
                    addLog('❌ Lỗi kết nối: ' + error);
                    updateStatus(false);
                    alert('Không thể kết nối WebSocket. Kiểm tra lại URL và token!');
                }
            );
        }
        
        function disconnect() {
            if (stompClient !== null) {
                if (subscription) {
                    subscription.unsubscribe();
                }
                stompClient.disconnect();
                addLog('Đã ngắt kết nối');
            }
            updateStatus(false);
        }
        
        function sendMessage() {
            const content = messageInput.value.trim();
            const conversationId = conversationIdInput.value.trim();
            
            if (!content) {
                return;
            }
            
            const message = {
                conversationId: conversationId,
                content: content,
                messageType: 'TEXT'
            };
            
            addLog('📤 Gửi tin nhắn: ' + content);
            stompClient.send(`/app/chat/${conversationId}`, {}, JSON.stringify(message));
            
            messageInput.value = '';
        }
        
        function displayMessage(message) {
            const messageDiv = document.createElement('div');
            const userId = userIdInput.value.trim();
            const isSent = message.senderId === userId;
            
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            
            messageDiv.innerHTML = `
                <div class="sender">${message.senderName}</div>
                <div class="content">${escapeHtml(message.content)}</div>
                <div class="time">${formatTime(message.sentAt)}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('vi-VN');
        }
        
        // Event listeners
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        sendBtn.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (stompClient !== null) {
                disconnect();
            }
        });
    </script>
</body>
</html>
