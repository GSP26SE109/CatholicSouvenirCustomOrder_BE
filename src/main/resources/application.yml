spring:
  application:
    name: CatholicSouvenirCustomOrder

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/catholic_souvenir}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 60000

  # Email Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:nhoklideptrai@gmail.com}
    password: ${MAIL_PASSWORD:amscawbhomhebsat}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  key: ${JWT_KEY:+N+X+g3cRIx2DEKzpO+klBxslpL3CCYfDj5ESSnqTNhA=}
  expiration: ${JWT_EXPIRATION:86400000}

# Application Configuration
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${APP_FRONTEND_URL:https://catholic-souvenir-custom.vercel.app}

server:
  forward-headers-strategy: framework

# Payment Gateway Configuration (VNPay & ZaloPay only)

ai:
  image:
    provider: ${AI_IMAGE_PROVIDER:huggingface}

huggingface:
  api:
    key: ${HUGGINGFACE_API_KEY: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}

zalopay:
  app-id: ${ZALOPAY_APP_ID:554}
  key1: ${ZALOPAY_KEY1:8NdU5pG5R2spGHGhyO99HN1OhD8IQJBn}
  key2: ${ZALOPAY_KEY2:uUfsWgfLkRLzq6W2uNXTCxrfxs51auny}
  endpoint: https://sb-openapi.zalopay.vn/v2/create
  callback-url: ${ZALOPAY_CALLBACK_URL:http://localhost:8080/api/payments/zalopay/callback}
  ipn-url: ${ZALOPAY_IPN_URL:http://localhost:8080/api/payments/zalopay/ipn}

vnpay:
  tmn-code: ${VNPAY_TMN_CODE:A1F15ZBS}
  hash-secret: ${VNPAY_HASH_SECRET:I8GJ3NOJ5A6X74QB41YUKWCWAB17A90R}
  url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  # Return URL: MUST point to backend /vnpay/return endpoint
  # Backend will then redirect to frontend based on platform
  return-url: ${VNPAY_RETURN_URL:https://catholic-souvenir-api.southeastasia.cloudapp.azure.com/api/payments/vnpay/return}
  # IPN URL: server-to-server callback for DB update (REQUIRED for production)
  ipn-url: ${VNPAY_IPN_URL:https://catholic-souvenir-api.southeastasia.cloudapp.azure.com/api/payments/vnpay/ipn}
  version: ${VNPAY_VERSION:2.1.0}
  command: ${VNPAY_COMMAND:pay}
  order-type: ${VNPAY_ORDER_TYPE:other}

supabase:
  url: ${SUPABASE_URL:https://ukglqatwjgokrcdvvysl.supabase.co}
  key: ${SUPABASE_KEY:sb_secret_kgQY8_2OQDKUzkv1d13_oA_rA9eKu7U}
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:ai-images}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:daiwsshlm}
  api-key: ${CLOUDINARY_API_KEY:931731612755631}
  api-secret: ${CLOUDINARY_API_SECRET:gCO38ygVl0ZeEUR8CFdjTNXbu8M}

ghn:
  api-url: ${GHN_API_URL:https://dev-online-gateway.ghn.vn}
  token: ${GHN_TOKEN:7c59e98a-310f-11f1-a973-aee5264794df}
  shop-id: ${GHN_SHOP_ID:199863}
  from-district-id: ${GHN_FROM_DISTRICT_ID:1442}
  from-ward-code: ${GHN_FROM_WARD_CODE:21211}
  callback-url: ${GHN_CALLBACK_URL:https://5007-14-187-119-138.ngrok-free.app/api/webhook/ghn}



