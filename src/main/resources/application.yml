spring:
  application:
    name: CatholicSouvenirCustomOrder
  datasource:
    url: jdbc:postgresql://localhost:54321/catholic-souvenir?TimeZone=UTC
    username: root
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true

jwt:
  key: +N+X+g3cRIx2DEKzpO+klBxslpL3CCYfDj5ESSnqTNhA=
  expiration: 86400000
payos:
  return-url: https://your-frontend.com/payment-success
  cancel-url: https://your-frontend.com/payment-cancel
