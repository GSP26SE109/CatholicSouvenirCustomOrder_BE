server {
    listen 80;
    server_name catholic-souvenir-api.southeastasia.cloudapp.azure.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name catholic-souvenir-api.southeastasia.cloudapp.azure.com;

    ssl_certificate /etc/letsencrypt/live/catholic-souvenir-api.southeastasia.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/catholic-souvenir-api.southeastasia.cloudapp.azure.com/privkey.pem;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
        proxy_set_header Host $host;
    }

    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;

        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://backend:8080/actuator/health;
    }
}