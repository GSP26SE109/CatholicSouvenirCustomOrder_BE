server {
    listen 80;
    # Tên miền DNS của Azure bạn đã cấu hình
    server_name catholic-souvenir-api.southeastasia.cloudapp.azure.com;

    # Tự động chuyển hướng mọi yêu cầu HTTP sang HTTPS (Bắt buộc để Vercel không chặn)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl; # Cổng HTTPS
    server_name catholic-souvenir-api.southeastasia.cloudapp.azure.com;

    # Sau khi chạy lệnh Certbot, các dòng ssl_certificate sẽ tự hiện ở đây

    # Cấu hình chung cho Proxy
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme; # Cực kỳ quan trọng cho Mixed Content

    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_read_timeout 300s;
        client_max_body_size 20M;
    }

    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
    }

    # Cấu hình cho WebSocket (Nếu bạn dùng để Chat/Thông báo)
    location /ws/ {
        proxy_pass         http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://backend:8080/actuator/health;
    }
}